{% extends 'base.html' %}

{% block title %}Delete Course{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h1>Delete Course</h1>
        <p class="lead">Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>
        <p class="text-danger">This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'courses:course_detail' object.slug %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
