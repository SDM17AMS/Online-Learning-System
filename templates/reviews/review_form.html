{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{% if review %}Edit{% else %}Add{% endif %} Review{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1>{% if review %}Edit{% else %}Add{% endif %} Review</h1>
        <p class="text-muted">For course: {{ course.title }}</p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Submit Review</button>
            <a href="{% url 'courses:course_detail' course.slug %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
